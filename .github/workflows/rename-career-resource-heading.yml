name: Rename career resource heading

on:
  push:
    paths:
      - .github/workflows/rename-career-resource-heading.yml

permissions:
  contents: write

jobs:
  update-heading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update index heading
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = 'Use fuller resources'
          new = 'Explore career resources'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'Expected exactly one occurrence of {old!r}; found {count}.')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm .github/workflows/rename-career-resource-heading.yml
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/rename-career-resource-heading.yml
          git commit -m "Update career resources heading"
          git push
